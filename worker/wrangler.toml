# Groundwork Worker — the one `/run` engine. Secrets (OPENROUTER_KEY, ARIZE_API_KEY, …) are set with
# `wrangler secret put`, never here. `.dev.vars` supplies them for local `wrangler dev` (gitignored).
name = "ldnmxx-hack-worker"
main = "src/worker.ts"
compatibility_date = "2026-07-01"

# Same-origin API on the Pages domain: sortmy.london/api/* -> this Worker (Worker routes win over Pages).
# Requires sortmy.london to be a zone on the Cloudflare account before `wrangler deploy`.
routes = [
  { pattern = "sortmy.london/api/*", zone_name = "sortmy.london" }
]

[observability]
enabled = true
head_sampling_rate = 1  # capture 100% of invocations → the ⌁ spans + request traces show in the Cloudflare dashboard (Workers ▸ Observability)

[vars]
# CORS allowlist: local Vite dev only — prod is same-origin (SPA + Worker /api on sortmy.london), no CORS.
ALLOWED_ORIGINS = "http://localhost:5173,https://sortmy.london"

# Per-IP throttle on POST /run → binding `RATE_LIMITER` (env.RATE_LIMITER.limit({key})). period is 10 or 60.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

# Cloudflare Workers AI — the first (free, keyless) render provider → binding `AI` (env.AI).
[ai]
binding = "AI"

# CF D1 — the read-through corpus store (W6 #13, ADR 0002). PROVISIONED 2026-07-22; EMPTY until the
# W4/#161 ingest lands. Schema: npx wrangler d1 migrations apply DB --remote --config wrangler.toml
# (always pass --config — bare wrangler walks up to the root Pages config). The Worker degrades to
# the bundled sample corpora whenever D1 is unbound, FAILING, or NOT YET SEEDED (empty gazetteer),
# so an empty store never breaks Care.
[[d1_databases]]
binding = "DB"
database_name = "sortmy_london_corpus"
database_id = "cc6bb743-4041-455e-bf30-b4ecd5d184c3"
migrations_dir = "migrations"

# P1 (#182): daily corpus-ingest cron (src/corpus/ingest.ts via scheduled()) — pulls the `corpus-data`
# release artifacts published by .github/workflows/ingest.yml (weekly), shadow->validate->swap into D1.
# 04:47 UTC: off-peak, offset from the ingester (Mon 05:17) so a same-day asset lands next morning.
[triggers]
crons = ["47 4 * * *"]
