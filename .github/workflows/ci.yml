name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Scaffold gate: docs lint + security. The ui/worker/ingest build+test jobs are added
# with Phase 1 (once those dirs are scaffolded). SHA-pin actions before relying in anger.
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx --yes markdownlint-cli2 "**/*.md"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: semgrep (SAST)
        run: |
          pip install --quiet semgrep
          semgrep scan --config p/typescript --error
