name: Deploy UI to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

# One-time setup: Settings ▸ Pages ▸ Source = GitHub Actions. The Worker is deployed separately
# (`make deploy`); the Pages SPA calls it cross-origin (worker CORS allowlists the Pages origin).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      # CI=true (set by Actions) makes vite.config.ts use base "/ldnmxx-hack/" for Pages.
      - run: npm run build
      # v5+ internally SHA-pins its own actions/upload-artifact; v3 used a tag (@v4), which the repo
      # Actions policy (sha_pinning_required) rejects transitively → the deploy startup-failed.
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
