---
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      npm:
        patterns: ["*"]
    labels: ["dependencies", "npm"]
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # AI-SDK majors break the browser-BYOK live-agent path (streamText / tool-call shapes) — handled
      # in a deliberate migration PR, not an auto-bump.
      - dependency-name: "ai"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@ai-sdk/openai"
        update-types: ["version-update:semver-major"]
      # @a2ui/react is 0.x, so a breaking renderer/protocol change can ship as a 0.x MINOR. Ignore both
      # so it's a deliberate migration PR, not an auto-bump (same rationale as the AI-SDK above). Patch
      # bumps still flow — CI's real-renderer test guards them.
      - dependency-name: "@a2ui/react"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # typescript-eslint can't parse TS 7 yet — worker+ui stay aligned on TS 6 (AGENTS.md gotcha;
      # #153's ui job failed exactly here: ERESOLVE typescript-eslint@8.64 vs typescript@7). Unignore
      # when typescript-eslint supports TS 7.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # zod is deliberately held at ^3 to match @a2ui/react's peer range — one deduped copy, measured
      # −17.9 KB gzip (engineering-practices · Performance). A v4 move is a deliberate migration with
      # the renderer, not an auto-bump.
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/worker"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      npm:
        patterns: ["*"]
    labels: ["dependencies", "npm"]
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # wrangler@4 peer-pins @cloudflare/workers-types to ^4; the v5 major conflicts (ERESOLVE).
      - dependency-name: "@cloudflare/workers-types"
        update-types: ["version-update:semver-major"]
      # typescript-eslint can't parse TS 7 yet — worker+ui stay aligned on TS 6 (AGENTS.md gotcha).
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "chore(ci)"
...
