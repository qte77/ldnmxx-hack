<!doctype html>
<html lang="en">
  <head>
    <script>
      // Anti-FOUC: apply an explicit theme before first paint (else follow system preference).
      (function () {
        try {
          var url = new URLSearchParams(location.search).get("theme");
          var ls = localStorage.getItem("qte77-theme");
          var m = [url, ls].find(function (v) {
            return v === "light" || v === "dark";
          });
          if (m) document.documentElement.setAttribute("data-theme", m);
          else document.documentElement.removeAttribute("data-theme");
        } catch (e) {
          /* private mode / storage disabled — non-fatal */
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Groundwork</title>
    <meta
      name="description"
      content="Groundwork — one AG-UI/A2UI workflow engine on a Cloudflare Worker, two London workflows. POST /run?usecase=<id> streams AG-UI events that render built-in A2UI cards."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
