<!doctype html>
<html lang="en">
  <head>
    <!-- Anti-FOUC theme + accent-variant init — external (not inline) so the page CSP stays strict
         (script-src 'self'). Blocking in <head>, so both still run before first paint. -->
    <script src="/theme-init.js"></script>
    <script src="/variant-init.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://sortmy.london/" />
    <!-- The one hex that cannot be a token: a meta attribute takes no var(). Keep in sync with
         --color-primary's default (variant A Thames Teal) in ui/src/tokens.css. -->
    <meta name="theme-color" content="#0e7581" />
    <title>sortmy.london — find the official public service you need</title>
    <meta
      name="description"
      content="The honest, free way to find the official UK public service you need near you — and know it's current. No cookies, no tracking, no sign-up."
    />
    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="sortmy.london" />
    <meta property="og:url" content="https://sortmy.london/" />
    <meta property="og:title" content="sortmy.london — find the official public service you need" />
    <meta
      property="og:description"
      content="The honest, free way to find the official UK public service you need near you — and know it's current."
    />
    <meta property="og:image" content="https://sortmy.london/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="sortmy.london — find the official public service you need" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="sortmy.london — find the official public service you need" />
    <meta
      name="twitter:description"
      content="The honest, free way to find the official UK public service you need near you."
    />
    <meta name="twitter:image" content="https://sortmy.london/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
