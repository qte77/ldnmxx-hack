<!doctype html>
<!-- Presence of this file turns OFF Cloudflare Pages' SPA fallback: a missing asset now returns a
     REAL 404 instead of index.html — which our /assets/* immutable Cache-Control once stamped into
     the edge cache as year-long HTML during a deploy-propagation window (see AGENT_LEARNINGS:
     "Pages SPA fallback + immutable /assets/*"). Safe here: the app is single-route (query params
     only), so no path-based deep link relies on the fallback. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Not found — sortmy.london</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #141210; color: #e8e2d9; }
      main { text-align: center; padding: 2rem; }
      a { color: #e89030; }
      @media (prefers-color-scheme: light) { body { background: #faf6ef; color: #2b2620; } a { color: #725810; } }
    </style>
  </head>
  <body>
    <main>
      <h1>Page not found</h1>
      <p>That address does not exist here.</p>
      <p><a href="/">Go to sortmy.london — find the official public service you need</a></p>
    </main>
  </body>
</html>
